<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} · {{ site.author }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Noto+Sans+SC:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  {% if page.mathjax %}
  <script>
    MathJax = {
      tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[','\\]']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
  {% endif %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
</head>
<body>

<!-- APEX Legends style Splash Screen — only on home page -->
<div class="splash" id="splash">
  <div class="splash-noise"></div>
  <div class="splash-center">
    <div class="splash-logo">MIEMIE</div>
    <div class="splash-sub">LIU YANG</div>
    <button class="splash-btn" id="splashBtn">
      <svg class="splash-btn-icon" viewBox="0 0 18 18"><path d="M15.25 9.5L3.25 16.5V2.5L15.25 9.5Z"/></svg>
      继续
    </button>
  </div>
  <div class="splash-bottom">
    <span>ESC 退出</span>
    <div class="splash-bottom-center">
      <button class="splash-theme-btn" id="splashThemeToggle">🌙</button>
      <span class="splash-lang-btn">中/EN</span>
    </div>
    <span>©2026 刘阳</span>
  </div>
</div>

<script>
(function() {
  // Only show splash on the home page
  if (window.location.pathname.replace(/\/$/, '') !== '' && window.location.pathname !== '/index.html') return;

  const splash = document.getElementById('splash');
  if (!splash) return;

  function hideSplash() {
    if (splash.classList.contains('splash-hidden')) return;
    splash.classList.add('splash-hidden');
    setTimeout(function() { splash.style.display = 'none'; }, 700);
  }

  splash.addEventListener('click', function(e) {
    var bottom = splash.querySelector('.splash-bottom');
    if (bottom && bottom.contains(e.target)) return;
    hideSplash();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') hideSplash();
  });

  // Sync theme toggle
  var splashThemeBtn = document.getElementById('splashThemeToggle');
  if (splashThemeBtn) {
    var currentTheme = localStorage.getItem('theme');
    if (!currentTheme) {
      currentTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    splashThemeBtn.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
    splashThemeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      var body = document.body;
      var isDark = body.classList.contains('dark');
      var newMode = isDark ? 'light' : 'dark';
      body.classList.remove('light', 'dark');
      if (newMode === 'dark') {
        body.classList.add('dark');
        splashThemeBtn.textContent = '☀️';
      } else {
        body.classList.add('light');
        splashThemeBtn.textContent = '🌙';
      }
      localStorage.setItem('theme', newMode);
    });
  }

  // Prevent body scroll while splash is visible
  document.body.style.overflow = 'hidden';
  setTimeout(function() { document.body.style.overflow = ''; }, 700);

  splash.style.display = 'flex';
})();
</script>

  <nav>
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="nav-brand">{{ site.author }}</a>
      <div class="nav-right">
        <div class="nav-links">
          <a href="{{ '/' | relative_url }}">首页</a>
          <a href="{{ '/#research' | relative_url }}">研究兴趣</a>
          <a href="{{ '/blog/' | relative_url }}">博客</a>
          <a href="{{ '/#about' | relative_url }}">关于</a>
        </div>
        <button class="theme-toggle" id="themeToggle" aria-label="切换主题">🌙</button>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <p>© {{ site.time | date: '%Y' }} {{ site.author }} · Powered by GitHub Pages</p>
    </div>
  </footer>

  <script>
    const toggle = document.getElementById('themeToggle');
    const body = document.body;

    function applyTheme(mode) {
      body.classList.remove('light', 'dark');
      if (mode === 'dark') {
        body.classList.add('dark');
        toggle.textContent = '☀️';
      } else {
        body.classList.add('light');
        toggle.textContent = '🌙';
      }
      localStorage.setItem('theme', mode);
    }

    const saved = localStorage.getItem('theme');
    if (saved) {
      applyTheme(saved);
    } else {
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      applyTheme(prefersDark ? 'dark' : 'light');
    }

    toggle.addEventListener('click', () => {
      const isDark = body.classList.contains('dark');
      applyTheme(isDark ? 'light' : 'dark');
    });
  </script>

</body>
</html>
